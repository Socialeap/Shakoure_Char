name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Socialeap
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/New_York
          plugin_languages: yes
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: issue, pr, release, member # Filter out "push" to avoid the timeout error
          plugin_languages_details: percentage
          plugin_languages_ignored: html, css
          plugin_lines: yes
          plugin_lines_history: yes # Shows a small graph of your coding volume over time
          plugin_lines_sections: base, repositories
